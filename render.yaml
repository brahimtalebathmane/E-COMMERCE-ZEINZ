services:
  - type: web
    name: zeinz-whatsapp-service
    runtime: node
    plan: free
    region: frankfurt
    # Install devDependencies too (Tailwind/PostCSS/TypeScript). Plain `npm ci` skips them when NODE_ENV=production.
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start
    healthCheckPath: /api/status
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      # OTP settings:
      - key: OTP_TTL_SECONDS
        value: "300"
      # On free plan, Baileys auth may not persist across restarts.
      # You may need to re-scan QR after sleep/redeploy.
      - key: WHATSAPP_AUTH_DIR
        value: ./baileys_auth

