# Railway config-as-code: https://docs.railway.app/reference/config-as-code
# Add a Volume in the Railway dashboard (e.g. mount at /var/data) and set WHATSAPP_AUTH_DIR=/var/data/baileys_auth
#
# Use Dockerfile (not Nixpacks) so the Docker build does not mount a cache on node_modules/.cache
# (Nixpacks + `npm ci` caused EBUSY / exit 240).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "npm run start"
