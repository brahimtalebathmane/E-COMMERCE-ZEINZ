# Next.js: do not set publish — @netlify/plugin-nextjs handles output + runtime.
#
# Netlify → Site configuration → Environment variables: set these for Production
# (and Preview if you use it). Values must match your Supabase project; copy
# from a local .env.local — do not commit secrets to git.
#   NEXT_PUBLIC_SUPABASE_URL
#   NEXT_PUBLIC_SUPABASE_ANON_KEY
#   SUPABASE_SERVICE_ROLE_KEY   (server-only; required for /api/orders, uploads, etc.)
#   ORDER_ACTION_SECRET         (min 16 chars; HMAC for post-checkout order actions — required for /api/orders)
#   NEXT_PUBLIC_SITE_URL        (your live URL, e.g. https://yoursite.netlify.app)
#   META_CAPI_ACCESS_TOKEN      (Business Manager system user token for the unified pixel)
#   META_CAPI_TEST_EVENT_CODE   (optional; e.g. TEST24694 — required for CAPI rows in Meta Test Events)
#   NEXT_PUBLIC_META_PIXEL_ID   (browser Pixel — baked in at build time on Netlify)
#   META_PIXEL_ID               (server CAPI — must match NEXT_PUBLIC_META_PIXEL_ID when both set)
#   GET /api/meta/health        (validates env; errors if pixel IDs mismatch)
#   products.meta_pixel_id      (LEGACY in DB — ignored for routing)
#
[build]
  command = "npm run build"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
